name: Bed Bugs

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, edited]

jobs:
  describe_pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false || github.event.action == 'ready_for_review'

    permissions:
      pull-requests: write
      contents: read

    concurrency:
      group: pr-description-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Generate and update PR description
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEM_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const prNumber = Number(process.env.PR_NUMBER);
            const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';

            async function react(type) {
              try {
                await github.rest.reactions.createForIssue({
                  owner,
                  repo,
                  issue_number: prNumber,
                  content: type,
                });
              } catch (e) {
                core.info(`Reaction failed (${type}): ${e.message}`);
              }
            }

            await react('eyes');

            const pr = (await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            })).data;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100,
              }
            );

            const MAX_PATCH = 12000;
            let remaining = MAX_PATCH;

            const fileSummary = files.map(f => {
              let s = `- ${f.filename} (${f.status}, +${f.additions}/-${f.deletions})`;

              if (f.patch && remaining > 0) {
                const snippet = f.patch.slice(0, remaining);
                remaining -= snippet.length;
                s += `\n\`\`\`diff\n${snippet}\n\`\`\``;
              }

              return s;
            }).join('\n\n');

            const requiredHeadings = [
              '## What does this PR do?',
              '## Why did you choose this solution?',
              '## What is the dependency graph of the changes?',
              '## How to test/verify?',
            ];

            const prompt = [
              'You are generating a GitHub Pull Request description.',
              '',
              'Use ONLY the provided PR title and changed files/diffs as source of truth.',
              'Do NOT reference any previous PR description.',
              '',
              `PR title: ${pr.title}`,
              '',
              'Return Markdown only. Use exactly these headings:',
              ...requiredHeadings,
              '',
              'Rules:',
              '- No extra sections',
              '- No code fences',
              '- First 3 sections: bullet points only',
              '- Testing section: numbered steps only',
              '',
              'Changed files and patches:',
              fileSummary || '(no changes)',
            ].join('\n');

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  generationConfig: { temperature: 0.2 },
                  contents: [{
                    role: 'user',
                    parts: [{ text: prompt }],
                  }],
                }),
              }
            );

            if (!response.ok) {
              const err = await response.text();
              core.setFailed(err);
              return;
            }

            const data = await response.json();
            const generated = data?.candidates?.[0]?.content?.parts
              ?.map(p => p.text || '')
              .join('\n')
              ?.trim();

            if (!generated) {
              core.setFailed('Empty response');
              return;
            }

            const stripFence = (t) => {
              const m = t.trim().match(/^```(?:md|markdown)?\s*([\s\S]*?)```$/i);
              return m ? m[1].trim() : t.trim();
            };

            const cleaned = stripFence(generated);

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: prNumber,
              body: cleaned,
            });

            core.info(`Updated PR #${prNumber}`);

            await react('rocket');
